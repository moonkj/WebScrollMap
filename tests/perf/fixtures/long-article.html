<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Perf Fixture — Long Article</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; max-width: 760px; margin: 0 auto; padding: 24px; line-height: 1.6; }
      h1 { margin-top: 48px; font-size: 28px; }
      h2 { margin-top: 32px; font-size: 22px; }
      h3 { margin-top: 24px; font-size: 18px; }
      p { margin: 12px 0; }
      img { display: block; width: 100%; max-width: 600px; background: #ddd; height: 240px; margin: 16px 0; }
    </style>
  </head>
  <body id="root">
    <script>
      // 긴 페이지 합성: 50 섹션 × (h2 + h3 + 4 p + 선택적 img)
      const root = document.getElementById('root');
      const h1 = document.createElement('h1');
      h1.textContent = 'Long Article Fixture';
      root.appendChild(h1);
      for (let i = 0; i < 50; i++) {
        const s = document.createElement('section');
        const h2 = document.createElement('h2');
        h2.textContent = 'Chapter ' + (i + 1);
        s.appendChild(h2);
        const h3 = document.createElement('h3');
        h3.textContent = 'Subsection A';
        s.appendChild(h3);
        for (let p = 0; p < 4; p++) {
          const para = document.createElement('p');
          para.textContent = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Section ' + (i + 1) + ' paragraph ' + (p + 1) + '. Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere cubilia curae.';
          s.appendChild(para);
        }
        if (i % 3 === 0) {
          const img = document.createElement('img');
          img.alt = 'placeholder';
          s.appendChild(img);
        }
        root.appendChild(s);
      }
    </script>
  </body>
</html>
