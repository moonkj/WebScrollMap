      l.indexOf('hi') === 0 ? 'hi' : 'en';

    });

    var legalView = document.getElementById('legal-view');
    var legalTitle = document.getElementById('legal-title');
    var legalBody = document.getElementById('legal-body');

      var sections = (LEGAL[lang] || LEGAL.en)[type];
